<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CW - Pay To UPI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111827; color: white; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; background: #1f2937; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .header { display: flex; align-items: center; gap: 15px; padding-bottom: 15px; border-bottom: 1px solid #374151; background: #111827; margin: -20px -20px 15px -20px; padding: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: #3b82f6; font-weight: bold; }
        .header h1 { font-size: 18px; font-weight: bold; color: #e5e7eb; }
        .upi-input-box { width: 100%; padding: 14px 15px; border-radius: 10px; border: 1px solid #4b5563; background: #111827; color: white; font-size: 14px; outline: none; }
        .upi-input-box:focus { border-color: #3b82f6; }
        .user-result-card { background: #263238; border-radius: 12px; padding: 15px; border: 1px solid #374151; display: none; align-items: center; gap: 12px; margin-top: 10px; }
        .avatar-circle-sm { width: 45px; height: 45px; background: #10b981; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; border: 2px solid white; }
        .user-text-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .btn-pay-trigger { background: #2563eb; color: white; border: none; padding: 9px 15px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .pay-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 24, 39, 0.96); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .pay-popup-overlay.open { opacity: 1; pointer-events: auto; }
        .pay-card { background: #1f2937; width: 90%; max-width: 360px; padding: 25px; border-radius: 16px; border: 1px solid #374151; text-align: center; }
        .pay-input { width: 100%; padding: 12px; font-size: 20px; text-align: center; border-radius: 8px; border: 1px solid #4b5563; background: #374151; color: #fb923c; outline: none; margin-bottom: 12px; font-weight: bold; }
        .mpin-input-pay { width: 100%; padding: 11px; font-size: 16px; text-align: center; letter-spacing: 4px; border-radius: 8px; border: 1px solid #4b5563; background: #374151; color: white; margin-bottom: 15px; outline: none; }
        .p-btn-row { display: flex; gap: 10px; }
        .p-btn { flex: 1; padding: 11px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .p-btn-back { background: #4b5563; color: white; }
        .p-btn-send { background: #10b981; color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn">⬅</a>
            <h1>To UPI ID Payment</h1>
        </div>
        <div class="input-group-wrapper">
            <input type="text" id="search-upi-id" class="upi-input-box" placeholder="यूजर की UPI ID डालें (e.g. cw1002@centralwallet)..." oninput="searchUserByUpi(this.value)">
        </div>
        <div class="user-result-card" id="upi-result-box">
            <div class="avatar-circle-sm">S</div>
            <div class="user-text-info"><span style="font-size: 14px; font-weight: bold;">सतीश कुमार</span><span style="font-size: 12px; color: #9ca3af; font-family: monospace;" id="found-upi-txt">cw1002@centralwallet</span></div>
            <button class="btn-pay-trigger" onclick="openUpiPaymentPopup()">Pay ➔</button>
        </div>
        <p id="helper-txt" style="text-align: center; color: #9ca3af; font-size: 13px; margin-top: 20px;">पैसे भेजने के लिए सेंट्रल वॉलेट UPI ID टाइप करें।</p>
    </div>
    <div class="pay-popup-overlay" id="payUpiModal">
        <div class="pay-card">
            <h2>पैसे भेजें सतीश को</h2>
            <p style="font-size: 13px; color: #9ca3af; margin-bottom: 15px;">दर: 1 Alpha Coin = 1 INR</p>
            <form onsubmit="sendCoinsViaUpi(event)">
                <input type="number" id="upi-coins-input" class="pay-input" placeholder="0.00" required>
                <input type="password" id="upi-mpin-input" class="mpin-input-pay" maxlength="4" placeholder="••••" required>
                <div class="p-btn-row">
                    <button type="button" class="p-btn p-btn-back" onclick="closeUpiPaymentPopup()">← Back</button>
                    <button type="submit" class="p-btn p-btn-send">Confirm Pay</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        function searchUserByUpi(val) {
            const resultBox = document.getElementById('upi-result-box');
            const helperTxt = document.getElementById('helper-txt');
            if (val.trim().toLowerCase().includes('@centralwallet') && val.trim().length > 15) {
                document.getElementById('found-upi-txt').innerText = val.trim().toLowerCase();
                helperTxt.style.display = 'none'; resultBox.style.display = 'flex';
            } else { resultBox.style.display = 'none'; helperTxt.style.display = 'block'; }
        }
        function openUpiPaymentPopup() { document.getElementById('payUpiModal').classList.add('open'); }
        function closeUpiPaymentPopup() { document.getElementById('payUpiModal').classList.remove('open'); }
        function sendCoinsViaUpi(e) {
            e.preventDefault();
            if (document.getElementById('upi-mpin-input').value === "1234") {
                alert("🎉 सफलता! पैसे यूपीआई आईडी द्वारा सुरक्षित ट्रांसफर कर दिए गए हैं।");
                closeUpiPaymentPopup();
                document.getElementById('search-upi-id').value = '';
                searchUserByUpi('');
            } else { alert("❌ गलत सुरक्षा MPIN!"); }
        }
    </script>
</body>
</html>
