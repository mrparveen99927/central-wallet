<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CW - Search & Pay</title>
    <style>
        /* 🎨 आपके बाकी पेजों से मैच करती प्रीमियम मोबाइल डार्क थीम */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #111827; color: white; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; background: #1f2937; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; padding-bottom: 75px; overflow-y: auto; }
        
        /* 🔙 हेडर */
        .header { display: flex; align-items: center; gap: 15px; padding-bottom: 15px; border-bottom: 1px solid #374151; background: #111827; margin: -20px -20px 15px -20px; padding: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; text-decoration: none; color: #3b82f6; font-weight: bold; }
        .header h1 { font-size: 18px; font-weight: bold; color: #e5e7eb; }

        /* 🔍 सर्च बार इनपुट */
        .search-wrapper { position: relative; width: 100%; }
        .search-input { width: 100%; padding: 13px 15px; border-radius: 10px; border: 1px solid #4b5563; background: #111827; color: white; font-size: 14px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: #3b82f6; }

        /* 👥 सर्च रिजल्ट कार्ड */
        .result-card { background: #263238; border-radius: 12px; padding: 15px; border: 1px solid #374151; display: none; align-items: center; gap: 12px; margin-top: 10px; }
        .user-avatar-sm { width: 45px; height: 45px; background: #10b981; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; border: 2px solid white; }
        .user-details-box { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .res-name { font-size: 15px; font-weight: bold; }
        .res-upi { font-size: 12px; color: #9ca3af; font-family: monospace; }
        .pay-trigger-btn { background: #2563eb; color: white; border: none; padding: 8px 14px; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        /* 💸 मनी ट्रांसफर बॉक्स (पॉप-अप मोड्यूल) */
        .pay-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 24, 39, 0.96); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .pay-popup-overlay.open { opacity: 1; pointer-events: auto; }
        .pay-card { background: #1f2937; width: 90%; max-width: 360px; padding: 25px; border-radius: 16px; border: 1px solid #374151; text-align: center; }
        .pay-input { width: 100%; padding: 12px; font-size: 20px; text-align: center; border-radius: 8px; border: 1px solid #4b5563; background: #374151; color: white; margin-bottom: 12px; outline: none; font-weight: bold; color: #fb923c; }
        .mpin-input-pay { width: 100%; padding: 11px; font-size: 16px; text-align: center; letter-spacing: 4px; border-radius: 8px; border: 1px solid #4b5563; background: #374151; color: white; margin-bottom: 15px; outline: none; }
        
        .p-btn-row { display: flex; gap: 10px; }
        .p-btn { flex: 1; padding: 11px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .p-btn-back { background: #4b5563; color: white; }
        .p-btn-send { background: #10b981; color: white; }

        /* 📌 फिक्स्ड बॉटम बार */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #111827; border-top: 1px solid #374151; display: grid; grid-template-columns: repeat(5, 1fr); padding: 10px 0; z-index: 99; }
        .bottom-link-btn { text-decoration: none; background: none; border: none; color: #9ca3af; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; cursor: pointer; font-weight: 500; }
        .bottom-link-btn.active { color: #3b82f6; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 🔙 हेडर -->
        <div class="header">
            <a href="dashboard.html" class="back-btn">⬅</a>
            <h1>To Mobile / UPI Search</h1>
        </div>

        <!-- 🔍 लाइव सर्च बार -->
        <div class="search-wrapper">
            <input type="text" id="user-search-input" class="search-input" placeholder="मोबाइल नंबर या uid@centralwallet दर्ज करें..." oninput="handleLiveUserSearch(this.value)">
        </div>
                <!-- 👥 सर्च रिज़ल्ट कार्ड (यूजर मिलते ही लाइव शो होगा) -->
        <div class="result-card" id="search-result-box">
            <div class="user-avatar-sm" id="res-initial">S</div>
            <div class="user-details-box">
                <span class="res-name" id="res-fullname">सतीश कुमार</span>
                <span class="res-upi" id="res-upi-id">cw1002@centralwallet</span>
            </div>
            <!-- पैसे भेजने का बटन -->
            <button class="pay-trigger-btn" onclick="openPayPopupModal()">Pay ➔</button>
        </div>
        
        <p id="search-empty-txt" style="text-align: center; color: #9ca3af; font-size: 13px; margin-top: 20px;">पैसे भेजने के लिए ऊपर नंबर या यूपीआई सर्च करें।</p>

        <!-- 📌 फिक्स्ड बॉटम बार (सभी वर्किंग डायरेक्ट लिंक्स के साथ) -->
        <div class="bottom-bar">
            <a href="dashboard.html" class="bottom-link-btn">
                <span style="font-size: 18px;">🏠</span>
                <span>Home</span>
            </a>
            <a href="search.html" class="bottom-link-btn active">
                <span style="font-size: 18px;">🔍</span>
                <span>Search</span>
            </a>
            <a href="#" class="bottom-link-btn" onclick="alert('Scan Page: Coming Soon!')">
                <span style="font-size: 18px;">📷</span>
                <span>Scan</span>
            </a>
            <a href="#" class="bottom-link-btn" onclick="alert('📢 कोई नया टूर्नामेंट अलर्ट नहीं है।')">
                <span style="font-size: 18px;">⚠️</span>
                <span>Alert</span>
            </a>
            <a href="#" class="bottom-link-btn" onclick="alert('History Page: Coming Soon!')">
                <span style="font-size: 18px;">📜</span>
                <span>History</span>
            </a>
        </div>
    </div>

    <!-- 🔒 मनी ट्रांसफर वीआईपी पॉप-अप (Pay Coins Modal) -->
    <div class="pay-popup-overlay" id="payModal">
        <div class="pay-card">
            <h2 id="pay-title">पैसे भेजें सतीश को</h2>
            <p style="font-size: 13px; color: #9ca3af; margin-bottom: 15px;">दर: 1 Alpha Coin = 1 INR</p>
            
            <form id="form-send-coins-action" onsubmit="executeCoinTransfer(event)">
                <label style="font-size:12px; color:#9ca3af; display:block; margin-bottom:5px; text-align:left;">Alpha Coins की संख्या:</label>
                <input type="number" id="pay-amount-input" class="pay-input" placeholder="0.00" required>
                
                <label style="font-size:12px; color:#9ca3af; display:block; margin-bottom:5px; text-align:left;">अपना सुरक्षा MPIN डालें:</label>
                <input type="password" id="pay-mpin-input" class="mpin-input-pay" maxlength="4" placeholder="••••" required>
                
                <div class="popup-btns-row">
                    <button type="button" class="p-btn p-btn-back" onclick="closePayPopupModal()">← Back</button>
                    <button type="submit" class="p-btn p-btn-send">Confirm Pay</button>
                </div>
            </form>
        </div>
    </div>
        <!-- 💻 लाइव डेटा प्रोसेसिंग जावास्क्रिप्ट -->
    <script>
        // 1. लाइव इनपुट सर्चिंग लॉजिक (लोकल मोड टेस्टिंग)
        function handleLiveUserSearch(val) {
            const resultBox = document.getElementById('search-result-box');
            const emptyTxt = document.getElementById('search-empty-txt');
            const cleanVal = val.trim();

            if (cleanVal.length >= 4) {
                // मान लेते हैं डेटाबेस से यह मैचिंग यूजर मिला
                document.getElementById('res-fullname').innerText = "सतीश कुमार";
                document.getElementById('res-upi-id').innerText = "cw1002@centralwallet";
                document.getElementById('res-initial').innerText = "S";
                document.getElementById('pay-title').innerText = "पैसे भेजें सतीश को";
                
                emptyTxt.style.display = 'none';
                resultBox.style.display = 'flex'; // रिज़ल्ट कार्ड दिखाओ
            } else {
                resultBox.style.display = 'none'; // छुपाओ
                emptyTxt.style.display = 'block';
            }
        }

        // 2. मनी ट्रांसफर पॉप-अप ओपन/क्लोज
        function openPayPopupModal() {
            document.getElementById('pay-amount-input').value = '';
            document.getElementById('pay-mpin-input').value = '';
            document.getElementById('payModal').classList.add('open');
        }

        function closePayPopupModal() {
            document.getElementById('payModal').classList.remove('open');
        }

        // 3. सुरक्षा MPIN डालकर पैसे भेजने [P2P_Send] का फाइनल लॉजिक
        function executeCoinTransfer(e) {
            e.preventDefault();
            const amount = document.getElementById('pay-amount-input').value;
            const mpin = document.getElementById('pay-mpin-input').value;

            // आपका सेट किया हुआ टेस्ट सुरक्षा पिन '1234'
            if (mpin === "1234") {
                alert(`🎉 सफलता! ${amount} Alpha Coins सतीश कुमार (cw1002@centralwallet) को सुरक्षित ट्रांसफर कर दिए गए हैं।\n\nट्रांजैक्शन आईडी पासबुक में दर्ज हो गई है।`);
                closePayPopupModal();
                document.getElementById('user-search-input').value = '';
                handleLiveUserSearch('');
            } else {
                alert("❌ गलत सुरक्षा MPIN! ट्रांजैक्शन सुरक्षा कारणों से ब्लॉक कर दिया गया है।");
                document.getElementById('pay-mpin-input').value = '';
            }
        }
    </script>
</body>
</html>
