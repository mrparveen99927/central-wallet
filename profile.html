<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Wallet - Dynamic Profile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000000; color: #ffffff; padding: 16px; padding-bottom: 60px; }

        /* Top Navbar */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .back-arrow { font-size: 24px; color: #ffffff; text-decoration: none; cursor: pointer; background: none; border: none; }
        .help-icon { font-size: 20px; color: #ffffff; }

        /* User Info Dynamic Banner */
        .user-info-card { background: #121212; padding: 16px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1c1c1c; display: flex; align-items: center; gap: 14px; }
        .profile-img-holder { width: 52px; height: 52px; background: #5f259f; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; border: 2px solid #9d4edd; overflow: hidden; }
        .profile-img-holder img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-size: 16px; font-weight: 700; text-transform: uppercase; }
        .user-phone { font-size: 13px; color: #aaaaaa; margin-top: 3px; }

        /* 🔳 CENTRAL WALLET DYNAMIC QR CONTAINER CARD */
        .qr-main-card { background: #121212; border: 1px solid #1c1c1c; border-radius: 20px; padding: 24px 16px; text-align: center; margin-bottom: 24px; }
        .bank-header-row { font-size: 13px; color: #888888; font-weight: 500; margin-bottom: 20px; text-align: center; }
        
        /* क्लीन और क्रैश-फ्री QR बॉक्स */
        .qr-graphic-box { width: 180px; height: 180px; background: #ffffff; margin: 0 auto 20px auto; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .qr-row { display: flex; justify-content: space-between; width: 100%; height: 35px; }
        .qr-square { width: 35px; height: 35px; background: #000000; border: 4px solid #ffffff; }
        .qr-center-logo { position: absolute; width: 44px; height: 44px; background: #5f259f; border-radius: 50%; border: 3px solid #ffffff; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; color: white; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .view-details-link { color: #9d4edd; font-size: 14px; font-weight: bold; text-decoration: none; display: block; margin-top: 10px; letter-spacing: 0.3px; }

        /* ⚙️ LIVE EDIT PROFILE BLOCK */
        .app-block-section { background: #121212; padding: 20px; border-radius: 12px; border: 1px solid #1c1c1c; margin-bottom: 24px; }
        .section-title { font-size: 14px; font-weight: bold; color: #9d4edd; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .input-item-group { margin-bottom: 14px; }
        .input-item-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
        .input-item-group input, .input-item-group select, .input-item-group textarea { width: 100%; padding: 12px; background: #000000; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 15px; outline: none; }
        .save-settings-btn { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* 📋 OPTIONS LIST BLOCK */
        .pe-list-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 4px; border-bottom: 1px solid #121212; cursor: pointer; }
        .list-left-content { display: flex; align-items: center; gap: 16px; }
        .list-icon-shape { font-size: 20px; color: #b3b3b3; width: 24px; text-align: center; }
        .list-main-label { font-size: 14px; font-weight: 500; color: #ffffff; }
        .list-arrow-right { font-size: 14px; color: #555555; }

        /* On/Off Toggle Switch */
        .toggle-switch-container { position: relative; width: 44px; height: 24px; }
        .toggle-switch-container input { opacity: 0; width: 0; height: 0; }
        .slider-round-shape { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333333; transition: .3s; border-radius: 24px; }
        .slider-round-shape:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider-round-shape { background-color: #10b981; }
        input:checked + .slider-round-shape:before { transform: translateX(20px); }

        /* 🛑 Logout Button */
        .logout-text-btn { display: flex; align-items: center; gap: 16px; padding: 20px 4px; color: #ef4444; font-size: 14px; font-weight: 600; cursor: pointer; border-top: 1px solid #1c1c1c; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Top Navbar Header -->
    <div class="top-nav">
        <a href="dashboard.html" class="back-arrow">←</a>
        <div class="help-icon" onclick="alert('Support System Connected')">❓</div>
    </div>

    <!-- User Current Information Display Card -->
    <div class="user-info-card">
        <div class="profile-img-holder" id="avatarBox">U</div>
        <div>
            <!-- डेटाबेस से लोड होने वाला डायनेमिक नाम और नंबर -->
            <div class="user-name" id="lbl-display-name">Loading Name...</div>
            <div class="user-phone" id="lbl-display-phone">Loading Phone...</div>
        </div>
    </div>

    <!-- 🔳 CENTRAL WALLET QR CONTAINER CARD -->
    <div class="qr-main-card">
        <div class="bank-header-row">
            <span>⚡ Scan QR to Transfer Wallet Coins</span>
        </div>
        
        <!-- क्रैश फ्री कोडेड QR बॉक्स -->
        <div class="qr-graphic-box" onclick="alert('This is your unique Wallet QR Code for internal transfers.')">
            <div class="qr-row">
                <div class="qr-square"></div>
                <div class="qr-square"></div>
            </div>
            <div class="qr-row" style="justify-content:flex-start;">
                <div class="qr-square"></div>
            </div>
            <div class="qr-center-logo">पे</div>
        </div>
        
        <!-- यूजर की अपनी डायनेमिक वॉलेट UPI ID -->
        <div class="view-details-link" id="lbl-display-upi-id">username@centralwallet</div>
    </div>

    <!-- ⚙️ MANAGE EDIT PROFILE BLOCK -->
    <div class="app-block-section">
        <div class="section-title">✏️ Edit Personal Details</div>
        
        <div class="input-item-group">
            <label>Profile Picture Link (URL)</label>
            <input type="text" placeholder="Paste image web link here" id="in-photo">
        </div>
        <div class="input-item-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter Full Name" id="in-name">
        </div>
        <div class="input-item-group">
            <label>Username / Unique Wallet ID</label>
            <input type="text" placeholder="e.g. parveen77 (बिना @ के)" id="in-username">
        </div>
        <div class="input-item-group">
            <label>Gender Selection</label>
            <select id="in-gender">
                <option value="Male">Male (पुरुष)</option>
                <option value="Female">Female (महिला)</option>
            </select>
        </div>
        <div class="input-item-group">
            <label>Full Residential Address</label>
            <textarea placeholder="Enter Address Details" id="in-address" rows="2"></textarea>
        </div>
        <button class="save-settings-btn" onclick="saveProfileChanges()">SAVE & UPDATE NOW</button>
    </div>

    <!-- List Options Section Row -->
    <div class="pe-list-row">
        <div class="list-left-content">
            <span class="list-icon-shape">📱</span>
            <div><div class="list-main-label">Shake to Scan</div></div>
        </div>
        <div class="toggle-switch-container">
            <input type="checkbox" id="shakeToggle" checked>
            <label class="slider-round-shape" for="shakeToggle"></label>
        </div>
    </div>

    <div class="pe-list-row" onclick="alert('Opening Preferences')">
        <div class="list-left-content">
            <span class="list-icon-shape">🎛️</span>
            <div><div class="list-main-label">Preferences</div></div>
        </div>
        <span class="list-arrow-right">&gt;</span>
    </div>

    <div class="pe-list-row" onclick="alert('Opening Security')">
        <div class="list-left-content">
            <span class="list-icon-shape">🔒</span>
            <div><div class="list-main-label">Security Settings</div></div>
        </div>
        <span class="list-arrow-right">&gt;</span>
    </div>

    <!-- 🛑 Log out Button Row -->
    <div class="logout-text-btn" onclick="executeLogoutAction()">
        <span style="font-size:18px;">🚪</span>
        <span>Log out</span>
    </div>

<script>
    // 🎲 पेज लोड होते ही करंट यूजर का डेटा (लॉगिन सेशन से) ऑटोमैटिक सेट करना
    window.onload = function() {
        // टेस्ट करने के लिए लोकल स्टोरेज से डेटा उठाना (भविष्य में बैकएंड इसे संभालेगा)
        let savedName = localStorage.getItem('user_name') || "PARVEEN";
        let savedPhone = localStorage.getItem('user_phone') || "+91 9992788757";
        let savedUsername = localStorage.getItem('user_id') || "parveen";
        let savedPhoto = localStorage.getItem('user_photo') || "";

        // स्क्रीन पर लाइव डेटा दिखाना
        document.getElementById('lbl-display-name').innerText = savedName;
        document.getElementById('lbl-display-phone').innerText = savedPhone;
