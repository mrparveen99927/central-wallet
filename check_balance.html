<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Balance - Central Wallet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #000000; color: #ffffff; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        .top-nav { display: flex; align-items: center; margin-bottom: 30px; }
        .back-arrow { font-size: 24px; color: #ffffff; text-decoration: none; cursor: pointer; margin-right: 15px; }
        .page-title { font-size: 18px; font-weight: 700; color: #9d4edd; text-transform: uppercase; }
        .balance-card { background: #121212; border: 1px solid #1c1c1c; border-radius: 20px; padding: 24px; text-align: center; }
        .title-txt { font-size: 16px; color: #aaaaaa; margin-bottom: 10px; font-weight: 600; }
        .balance-display { font-size: 32px; font-weight: 800; color: #10b981; margin-bottom: 20px; display: none; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 12px; background: #000000; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 18px; text-align: center; letter-spacing: 5px; outline: none; }
        .submit-btn { width: 100%; padding: 14px; background: #9d4edd; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="top-nav">
    <span class="back-arrow" onclick="window.location.href='dashboard.html'">←</span>
    <div class="page-title">Check Balance</div>
</div>

<div class="balance-card">
    <div class="title-txt">N&N Token Balance</div>
    
    <!-- बैलेंस एरिया जो सही MPIN डालने पर खुलेगा -->
    <div id="balance-show" class="balance-display">₹ 0.00</div>

    <!-- MPIN डालने का बॉक्स -->
    <div id="mpin-area">
        <div class="input-group">
            <label>ENTER 4-DIGIT MPIN</label>
            <input type="password" id="user-mpin" maxlength="4" placeholder="••••">
        </div>
        <button class="submit-btn" onclick="verifyMpinAndGetBalance()">View Balance</button>
    </div>
</div>

<script>
    const API_URL = "https://central-wallet-1.onrender.com";

    async function verifyMpinAndGetBalance() {
        const mpin = document.getElementById('user-mpin').value.trim();
        const uid = localStorage.getItem('user_uid');

        if (!uid) {
            alert("❌ सेशन समाप्त! दोबारा लॉगिन करें।");
            window.location.href = "index.html";
            return;
        }
        if (mpin.length !== 4 || isNaN(mpin)) {
            alert("❌ कृपया 4 अंकों का सही MPIN दर्ज करें!");
            return;
        }

        try {
            // बैकएंड इंजन से बैलेंस की लाइव मांग
            const response = await fetch(`${API_URL}/api/wallet/check-balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: uid, mpin: mpin })
            });

            const result = await response.json();

            if (response.ok || result.success) {
                // MPIN डिब्बा छुपाकर असली बैलेंस दिखाना
                document.getElementById('mpin-area').style.display = 'none';
                const balBox = document.getElementById('balance-show');
                balBox.innerText = `₹ ${parseFloat(result.balance).toFixed(2)}`;
                balBox.style.display = 'block';
            } else {
                alert(`❌ फेल: ${result.message}`);
            }
        } catch (err) {
            alert("❌ सर्वर से कनेक्शन नहीं हो पाया!");
            console.error(err);
        }
    }
</script>

</body>
</html>
